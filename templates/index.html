<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Chatbot</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Sora:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <div class="brand">
        <span class="dot"></span>
        <span class="brand-name">NEURAL CHAT</span>
      </div>
      <div class="status">
        <span class="status-dot"></span>
        <span>Mistral-7B Online</span>
      </div>
    </header>

    <main class="chat-area" id="chatArea">
      <div class="welcome">
        <div class="welcome-icon">&#9650;</div>
        <p>Start a conversation below</p>
      </div>
    </main>

    <footer class="input-bar">
      <textarea id="userInput" placeholder="Type your message..." rows="1"></textarea>
      <button id="sendBtn" onclick="sendMessage()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </footer>
  </div>

  <script src="{{ url_for('static', filename='js/chat.js') }}"></script>
</body>
</html>
